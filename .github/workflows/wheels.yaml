name: Test, build, release

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - 'releases/**'
  release:
    types: [published]

jobs:
  format_test:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv venv
          uv run python -m compileall -f arc/*.py
      - name: Lint and format check
        run: |
          # stop the build if there are Python syntax errors or undefined names
          uvx ruff check
          uv run python -m compileall -f arc/*.py
      - name: Typing check
        run: |
          uv run mypy .

  function_test:
    name: Basic test suite  
    runs-on: ubuntu-latest
    needs: [format_test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup ARC
        run: |
          uv venv
      - name: Run tests
        run:
          uv run coverage run -m pytest -s -v
      - name: Coverage report
        run:
          uv run coverage report -m

  security_test:
    name: Trivy security scan
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup ARC
        run: |
          uv venv
          uv sync
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Trivy vulnerability scanner (SARIF)
        run: |
          trivy fs . --severity HIGH,CRITICAL --ignore-unfixed --format sarif --output trivy-results.sarif
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      - name: Fail build on High/Critical Vulnerabilities
        run: |
          trivy fs . --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [function_test, security_test]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      # Used to host cibuildwheel
      - uses: actions/setup-python@v5

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.3.1

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    needs: [function_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    name: Publish package to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Upload 
        uses: pypa/gh-action-pypi-publish@release/v1
